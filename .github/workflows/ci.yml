name: DevOpsStudyApp CI

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

    #1. Get Code
      - name: Checkout code
        uses: actions/checkout@v3

    #2. Set up docker
      - name: Build Docker image
        run: docker build -t devops-study-app .

    #3. Run container test
      - name: Run container
        run: |
          docker run -d -p 80:80 --name app devops-study-app
          sleep 10
          curl http://localhost:80 || exit 1