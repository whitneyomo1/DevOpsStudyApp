<!DOCTYPE html>
<html>

<head>
    <title>
        Learn language notes
    </title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">

</head>

<body>
    <nav class="sidebar">
        <a href="{{ url_for('home') }}">Home</a>
        <a href="{{ url_for('add_flashcard') }}">Add Flashcard</a>
        <a href="{{ url_for('study') }}">Study</a>
        <a href="{{ url_for('review') }}">Review words</a>
        <a href="{{ url_for('quiz') }}">Quiz</a>
    </nav>

    <header class="page-title">Review words</header> 
    
    {% for id, question, answer in flashcards %}
    <div class="review-card">

        <div class="qa-row">
            <div class="question">{{ question }}</div>

            <div class="divider"></div>

            <div class="answer">{{ answer }}</div>
        </div>

        <form action="{{ url_for('delete_flashcard', id=id) }}" method="post">
            <button class="remove-btn" type="submit">Remove</button>
        </form>

    </div>
    {% endfor %}
</body>

</html>
