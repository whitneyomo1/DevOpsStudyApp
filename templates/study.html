<!DOCTYPE html>
<html>
    <head>
        <title>Study flash cards</title>
    </head>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <body>
        
        <nav class="sidebar">
            <a href="{{ url_for('home') }}">Home</a>
            <a href="{{ url_for('add_flashcard') }}">Add Flashcard</a>
            <a href="{{ url_for('study') }}">Study</a>
            <a href="{{ url_for('review') }}">Review words</a>
            <a href="{{ url_for('quiz') }}">Quiz</a>
        </nav>

        <!-- <div class="container"> -->
        <header class="page-header">
            <h2>123339433 - Whitney Omorodion - Study Flashcards App</h2>
        </header>
            <div class="carousel">
            {% for id, question, answer in flashcards %}
            <div class="flashcard">
                <p id="question">{{ question }}</p>
                <!-- <label> -->
                    <!-- <input type="checkbox" class="toggle-answer"> Show Answer -->
                    <p class="answer">{{ answer }}</p>
                <!-- </label> -->
                
            </div>
            {% else %}
                <p>No flashcards yet. Add some first!</p>
            {% endfor %}
            <!-- </div> -->
        </div>
        <footer>
            <nav class="nav-links">
            <a href="{{ url_for('add_flashcard') }}" class="nav-btn">Add more words to Study</a>
            </nav>
        </footer>
    </body>
</html>
