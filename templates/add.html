<!DOCTYPE html>
<html>
    <head>
        <title>
            Learn language notes
        </title>
        <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">

    </head>
    <body class="body">
        <nav class="sidebar">
            <a href="{{ url_for('home') }}">Home</a>
            <a href="{{ url_for('add_flashcard') }}">Add Flashcard</a>
            <a href="{{ url_for('study') }}">Study</a>
            <a href="{{ url_for('review') }}">Review words</a>
            <a href="{{ url_for('quiz') }}">Quiz</a>
        </nav>

        <header>
            <p>123339433</p>
            <!-- <p></p> -->
        </header>
        <div class="container">
            <nav class="nav-links">
            <a href="{{ url_for('study', index=0) }}" class="nav-btn">Go to Flashcards</a>
            </nav>
            <h2>Add flashcard</h2>

            <form method="post" class="flashcard-form">
                <label for="word">Word you would like to translate</label>
                <input type="text" id="word" name="word" class="form-input" required>

                <label for="translation">Translation of that word</label>
                <input type="text" name="translation" id="translation"  class="form-input" required>

                <button type="submit" class="btn-submit">Add flash card</button>
            </form> 
            {% if message %}
                <p style="color:red; font-weight:bold;">
                    {{ message }}
                 </p>
{% endif %}
        </div>
        <footer>
            <p>Whitney Omorodion</p>
        </footer>
    </body>
</html>
